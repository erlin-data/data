const TEXT = {
    zh: { title: "数据目录", search: "搜索数据" },
    en: { title: "Datas", search: "Search data" }
};

const CATA_MAP = {
    "标准": "Standards",
    "环保": "Environment",
    "医学": "Medical",
    "交通": "Transportation",
    "科技": "Technology",
    "金融": "Finance",
    "农业": "Agriculture",
    "司法": "Legal",
    "教育": "Education",
    "文化": "Culture",
    "机构": "Organizations",
    "灾害": "Disaster",
    "其他": "Others"
};

let isEN = new URLSearchParams(location.search).get("lang") === "en";

const clean = s => s.replace(/^【.*?】/, "");

function escapeReg(s){
    return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}

function highlight(text, keyword){
    if(!keyword) return text;
    return text.replace(new RegExp(`(${escapeReg(keyword)})`,"ig"),'<span class="hl">$1</span>');
}

function groupData(list){
    const map = {};
    list.forEach(i=>{
        if(!map[i.cata]) map[i.cata] = [];
        map[i.cata].push(i);
    });
    return map;
}

function match(i, keyword, cata){
    if(!keyword) return true;

    return (
        (i.title || "").includes(keyword) ||
        (i["English-title"] || "").toLowerCase().includes(keyword.toLowerCase()) ||
        cata.includes(keyword)
    );
}

function getName(i){
    return isEN ? (i["English-title"] || clean(i.title)) : i.title;
}

function getCata(c){
    return isEN ? (CATA_MAP[c] || c) : c;
}

function render(keyword=""){
    const app = document.getElementById("app");
    app.innerHTML = "";

    const grouped = groupData(rawData);

    Object.keys(grouped)
    .sort((a, b) => {
        const order = Object.keys(CATA_MAP);
        return order.indexOf(a) - order.indexOf(b);
    })
    .forEach(k=>{
        const list = grouped[k].filter(i=>match(i, keyword, k));
        if(!list.length) return;

        const card = document.createElement("div");
        card.className = "card";

        const h = document.createElement("div");
        h.className = "card-header";
        h.innerHTML = highlight(`${getCata(k)} (${list.length})`, keyword);

        const c = document.createElement("div");
        const grid = document.createElement("div");
        grid.className = "grid";

        list.forEach(i=>{
            const d = document.createElement("div");
            d.className = "item";
            d.innerHTML = `<a href="https://www.goofish.com/item?id=${i.itemId}" target="_blank">
                ${highlight(clean(getName(i)), keyword)}
            </a>`;
            grid.appendChild(d);
        });

        h.onclick = ()=>{
            c.style.display = c.style.display === "none" ? "block" : "none";
        };

        c.appendChild(grid);
        card.appendChild(h);
        card.appendChild(c);
        app.appendChild(card);
    });
}

function applyI18n(){
    const lang = isEN ? "en" : "zh";
    document.getElementById("title").innerText = TEXT[lang].title;
    document.getElementById("search").placeholder = TEXT[lang].search;
}

document.getElementById("search").oninput = e=>{
    render(e.target.value.trim());
};

document.getElementById("langBtn").onclick = ()=>{
    isEN = !isEN;

    const url = new URL(location);
    url.searchParams.set("lang", isEN ? "en" : "zh");
    history.replaceState(null, "", url);

    document.getElementById("langBtn").innerText = isEN ? "中文" : "EN";

    applyI18n();
    render(document.getElementById("search").value);
};

document.getElementById("langBtn").innerText = isEN ? "中文" : "EN";
applyI18n();
render();

</script>
